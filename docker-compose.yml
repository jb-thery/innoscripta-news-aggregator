name: signal-desk

services:
  web:
    build:
      context: .
      args:
        VITE_PUBLIC_POSTHOG_KEY: "${VITE_PUBLIC_POSTHOG_KEY:-}"
        VITE_PUBLIC_POSTHOG_HOST: "${VITE_PUBLIC_POSTHOG_HOST:-/ingest}"
    init: true
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    stop_grace_period: 10s
