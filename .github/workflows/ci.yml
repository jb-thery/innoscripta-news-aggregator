name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level low

      - name: Check generated API client
        run: |
          pnpm generate:api
          git diff --exit-code

      - name: Check formatting and lint
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Build application
        run: pnpm build

      - name: Build static demo
        run: pnpm build:static-demo

      - name: Build GitHub Pages demo
        run: pnpm build:pages

  browser:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: pnpm test:e2e

  container:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build -t signal-desk:ci .

      - name: Smoke-test Docker runtime
        run: |
          cleanup() {
            docker rm --force signal-desk-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run --detach --name signal-desk-ci --publish 3000:3000 signal-desk:ci

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null; then
              break
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null
          curl --fail --silent "http://127.0.0.1:3000/api/search?q=AI" >/dev/null
          docker stop --time 10 signal-desk-ci
          docker rm signal-desk-ci
          trap - EXIT

  # Semantic release runs last, only after every gate passes on a push:
  # develop publishes a staging pre-release, main publishes a production release.
  # continue-on-error keeps a release hiccup from blocking the static-demo deploy.
  release:
    name: Release
    needs: [quality, browser, container]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        run: npx --yes semantic-release@24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
